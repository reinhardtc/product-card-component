<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main>
      <div class="card-component">
        <img
          class="product-image"
          src="./assets/image-product-desktop.jpg"
          alt="perfume-image"
        />
        <div class="product-information">
          <div class="product-overview">
            <p class="product-type">PERFUME</p>
            <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
            <p class="product-description">
              A floral, solar and voluptuous interpretation composed by Olivier
              Polge, Perfumer-Creator for the House of CHANEL.
            </p>
          </div>
          <div class="price">
            <p class="sale-price">$149.99</p>
            <p class="full-price"><s>$169.99</s></p>
          </div>
          <div class="add-to-cart">
            <img
              class="add-to-cart-icon"
              src="./assets/icon-cart.svg"
              alt="cart-icon"
            />
            <p>Add to Cart</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
